services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: machineflow
      POSTGRES_USER: machineflow
      POSTGRES_PASSWORD: machineflow_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U machineflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/sirbuschi2003/machineflow-backend:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://machineflow:machineflow_secret@db:5432/machineflow
      SESSION_SECRET: super_secret_session_key_change_in_production
      PORT: 3002
      NODE_ENV: production
      FRONTEND_URL: http://localhost:5174
    ports:
      - "3002:3002"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: ghcr.io/sirbuschi2003/machineflow-frontend:latest
    restart: unless-stopped
    environment:
      VITE_API_TARGET: http://backend:3002
    ports:
      - "5174:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
